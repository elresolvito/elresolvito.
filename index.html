<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Resolvito</title>
    <style>
      /* Estilos globales */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f8faf8;
      }
      
      /* Header - ESTÁTICO (no lo toca React) */
      .static-header {
        background: #0d3b33;
        color: white;
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 50;
      }
      
      .static-logo {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      
      .static-logo-circle {
        width: 48px;
        height: 48px;
        background: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #0d3b33;
        font-weight: bold;
        font-size: 1.2rem;
      }
      
      .static-nav {
        display: flex;
        gap: 0.5rem;
      }
      
      .static-nav-btn {
        background: transparent;
        border: none;
        color: rgba(255,255,255,0.8);
        padding: 0.5rem 1rem;
        border-radius: 999px;
        cursor: pointer;
        font-size: 0.9rem;
      }
      
      .static-nav-btn:hover {
        background: rgba(255,255,255,0.1);
        color: white;
      }
      
      /* Hero - ESTÁTICO (no lo toca React) */
      .static-hero {
        max-width: 1200px;
        margin: 0 auto;
        padding: 4rem 2rem;
        text-align: center;
      }
      
      .static-hero h1 {
        font-size: 4rem;
        font-weight: 800;
        color: #1a1a1a;
        margin-bottom: 0.5rem;
      }
      
      .static-hero .subtitle {
        font-size: 1.25rem;
        color: #4a4a4a;
        margin-bottom: 3rem;
      }
      
      .static-categories {
        display: flex;
        justify-content: center;
        gap: 2rem;
      }
      
      .static-category {
        font-size: 1.1rem;
        color: #2d2d2d;
        cursor: pointer;
        padding: 0.5rem 1rem;
        border-radius: 999px;
      }
      
      .static-category.active {
        background: #0d3b33;
        color: white;
      }
      
      /* Separador */
      .static-divider {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem;
      }
      
      .static-divider hr {
        border: none;
        border-top: 1px solid #e0e0e0;
      }
      
      /* Tabs - ESTÁTICAS (no las toca React) */
      .static-tabs {
        display: flex;
        justify-content: center;
        gap: 2rem;
        padding: 1rem 0;
        border-bottom: 1px solid #e0e0e0;
        background: white;
        position: sticky;
        top: 80px;
        z-index: 40;
      }
      
      .static-tab {
        color: #666;
        cursor: pointer;
        padding: 0.5rem 1rem;
        font-size: 1rem;
      }
      
      .static-tab:hover {
        color: #0d3b33;
      }
      
      .static-tab.active {
        color: #0d3b33;
        font-weight: 600;
        border-bottom: 2px solid #0d3b33;
      }
      
      /* Contenedor para React */
      #react-root {
        min-height: 50vh;
      }
      
      /* Loader */
      .loader {
        text-align: center;
        padding: 4rem;
        color: #666;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-B3jTvqQp.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DoEmOoxH.css">
  </head>
  <body>
    <!-- HEADER ESTÁTICO - Siempre visible -->
    <header class="static-header">
      <div class="static-logo">
        <div class="static-logo-circle">ER</div>
        <div>
          <h2 style="font-size:1.5rem; margin-bottom:0.25rem;">El Resolvito</h2>
          <p style="opacity:0.8; font-size:0.875rem;">Tu tienda a domicilio</p>
        </div>
      </div>
      
      <nav class="static-nav">
        <button class="static-nav-btn">Productos</button>
        <button class="static-nav-btn">Servicios</button>
        <button class="static-nav-btn">Rentas</button>
        <button class="static-nav-btn">Ofertas Mayor</button>
      </nav>
    </header>

    <!-- HERO ESTÁTICO - Siempre visible -->
    <div class="static-hero">
      <h1>El Resolvito</h1>
      <div class="subtitle">Tu tienda a domicilio</div>
      
      <div class="static-categories">
        <span class="static-category">Productos</span>
        <span class="static-category">Servicios</span>
        <span class="static-category">Rentas</span>
        <span class="static-category active">Ofertas Mayor</span>
      </div>
    </div>

    <div class="static-divider">
      <hr />
    </div>

    <!-- TABS ESTÁTICAS - Siempre visibles -->
    <div class="static-tabs">
      <span class="static-tab active">Productos</span>
      <span class="static-tab">Servicios</span>
      <span class="static-tab">Rentas</span>
      <span class="static-tab">Ofertas Mayor</span>
    </div>

    <!-- CONTENEDOR PARA REACT (solo los productos) -->
    <div id="root">
      <div class="loader">
        <div style="font-size:2rem; margin-bottom:1rem;">🛍️</div>
        <h3>Cargando productos...</h3>
      </div>
    </div>
  </body>
</html>
