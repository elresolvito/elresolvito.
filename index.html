<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Resolvito</title>
    <style>
      /* Reset básico */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: system-ui, sans-serif; background: #f8faf8; }
      
      /* Header */
      .header {
        background: #0d3b33; color: white; padding: 1rem 2rem;
        display: flex; align-items: center; justify-content: space-between;
      }
      .logo { display: flex; align-items: center; gap: 1rem; }
      .logo-circle {
        width: 48px; height: 48px; background: white; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: #0d3b33; font-weight: bold; font-size: 1.2rem;
      }
      
      /* HERO - Este es el que debe verse */
      .hero {
        text-align: center; padding: 4rem 2rem; max-width: 1200px; margin: 0 auto;
      }
      .hero h1 {
        font-size: 4rem; font-weight: 800; color: #1a1a1a; margin-bottom: 0.5rem;
      }
      .hero .subtitle {
        font-size: 1.25rem; color: #4a4a4a; margin-bottom: 3rem;
      }
      .hero-categories {
        display: flex; justify-content: center; gap: 2rem;
      }
      .hero-category {
        font-size: 1.1rem; color: #2d2d2d; cursor: pointer;
        padding: 0.5rem 1rem; border-radius: 999px;
      }
      .hero-category.active {
        background: #0d3b33; color: white;
      }
      
      /* Tabs */
      .tabs {
        display: flex; justify-content: center; gap: 2rem;
        border-bottom: 1px solid #e0e0e0; padding: 1rem 0;
      }
      .tab {
        color: #666; cursor: pointer; padding: 0.5rem 1rem;
      }
      .tab.active {
        color: #0d3b33; font-weight: 600; border-bottom: 2px solid #0d3b33;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-B3jTvqQp.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DoEmOoxH.css">
  </head>
  <body>
    <div id="root">
      <!-- VERSIÓN ESTÁTICA COMPLETA -->
      <div>
        <!-- Header -->
        <header class="header">
          <div class="logo">
            <div class="logo-circle">ER</div>
            <div>
              <h2>El Resolvito</h2>
              <p style="opacity:0.8; font-size:0.875rem;">Tu tienda a domicilio</p>
            </div>
          </div>
          <div style="display:flex; gap:0.5rem;">
            <button style="background:transparent; border:none; color:white; padding:0.5rem 1rem; cursor:pointer;">Productos</button>
            <button style="background:transparent; border:none; color:white; padding:0.5rem 1rem; cursor:pointer;">Servicios</button>
            <button style="background:transparent; border:none; color:white; padding:0.5rem 1rem; cursor:pointer;">Rentas</button>
            <button style="background:transparent; border:none; color:white; padding:0.5rem 1rem; cursor:pointer;">Ofertas</button>
          </div>
        </header>

        <!-- HERO - ESTO ES LO QUE DEBE VERSE -->
        <div class="hero">
          <h1>El Resolvito</h1>
          <div class="subtitle">Tu tienda a domicilio</div>
          <div class="hero-categories">
            <span class="hero-category">Productos</span>
            <span class="hero-category">Servicios</span>
            <span class="hero-category">Rentas</span>
            <span class="hero-category active">Ofertas Mayor</span>
          </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
          <span class="tab active">Productos</span>
          <span class="tab">Servicios</span>
          <span class="tab">Rentas</span>
          <span class="tab">Ofertas Mayor</span>
        </div>

        <!-- Mensaje de carga -->
        <div style="text-align:center; padding:4rem; color:#666;">
          Cargando productos...
        </div>
      </div>
    </div>
  </body>
</html>
